      const yearFilter = document.getElementById("yearFilter");
      const monthFilter = document.getElementById("monthFilter");
      const nameFilter = document.getElementById("nameFilter");
      const tableBody = document.getElementById("pdfTable").querySelector("tbody");

      function populateFilters() {
          const years = Object.keys(jsonData);
          years.forEach(year => {
              const option = document.createElement("option");
              option.value = year;
              option.textContent = year;
              yearFilter.appendChild(option);
          });

          const monthOrder = [
              "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", 
              "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
          ];

          const allMonths = new Set();
          years.forEach(year => {
              Object.keys(jsonData[year]).forEach(month => allMonths.add(month));
          });

          Array.from(allMonths).sort((a, b) => {
              return monthOrder.indexOf(a) - monthOrder.indexOf(b);
          }).forEach(month => {
              const option = document.createElement("option");
              option.value = month;
              option.textContent = month;
              monthFilter.appendChild(option);
          });
      }

      function displayTable() {
          const selectedYear = yearFilter.value;
          const selectedMonth = monthFilter.value;
          const searchName = nameFilter.value.toLowerCase();

          tableBody.innerHTML = "";

          const monthOrder = [
              "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", 
              "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
          ];

          Object.keys(jsonData).forEach(year => {
              if (selectedYear && selectedYear !== year) return;

              Object.keys(jsonData[year]).sort((a, b) => {
                  return monthOrder.indexOf(a) - monthOrder.indexOf(b);
              }).forEach(month => {
                  if (selectedMonth && selectedMonth !== month) return;

                  const monthData = jsonData[year][month];
                  if (!monthData || monthData.count === 0) return;

                  monthData.files.forEach(file => {
                      if (searchName && !file.name.toLowerCase().includes(searchName)) return;

                      const row = document.createElement("tr");
                      
                      // Nome do arquivo (descrição)
                      const nameCell = document.createElement("td");
                      nameCell.className = "px-6 py-4 text-left";
                      nameCell.textContent = file.name.replace('.pdf', '');
                      
                      // Mês
                      const monthCell = document.createElement("td");
                      monthCell.className = "px-6 py-4 text-left";
                      monthCell.textContent = month;
                      
                      // Ano
                      const yearCell = document.createElement("td");
                      yearCell.className = "px-6 py-4 text-left";
                      yearCell.textContent = year;
                      
                      // Ação (visualizar)
                      const actionCell = document.createElement("td");
                      actionCell.className = "px-6 py-4 text-right";
                      const link = document.createElement("a");
                      link.href = file.link;
                      link.target = "_blank";
                      link.className = "btn-primary px-4 py-2 rounded-lg inline-flex items-center hover:shadow-lg transition-all";
                      link.innerHTML = '<i class="fas fa-eye mr-2"></i> Visualizar';
                      actionCell.appendChild(link);

                      // Adiciona as células na ordem correta
                      row.appendChild(nameCell);
                      row.appendChild(monthCell);
                      row.appendChild(yearCell);
                      row.appendChild(actionCell);
                      tableBody.appendChild(row);
                  });
              });
          });
      }
