<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ZAMine · Estoque Goiás</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --coal:#0a0b0d; --panel:#12141a; --steel:#181c23; --steel2:#1f242d;
  --rivet:#272d38; --rivet-hi:#333b48;
  --accent:#f97316; --accent-hot:#fb8b33; --accent-soft:rgba(249,115,22,.13);
  --ok:#2fcb6f; --danger:#ff5a48; --amber:#ffc24b; --cyan:#35c6d9; --violet:#8b5cf6; --pink:#ec4899;
  --ink:#f4f5f7; --ink-dim:#9aa3b0; --ink-faint:#5c6572;
  --r-lg:16px; --r-md:12px; --r-sm:9px;
  --display:'Chakra Petch',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--coal);color:var(--ink);font-family:var(--body);
  -webkit-tap-highlight-color:transparent;overflow:hidden;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#2b323d;border-radius:8px;border:2px solid var(--coal);}
.mono{font-family:var(--mono);}
.display{font-family:var(--display);}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

#app{position:fixed;inset:0;display:flex;background:var(--coal);}

/* ============ SIGNATURE: hazard stripe ============ */
.hazard{height:5px;flex-shrink:0;background:repeating-linear-gradient(135deg,var(--accent) 0 12px,#15181e 12px 24px);opacity:.9;}

/* ============ LOGIN ============ */
.login-screen{position:fixed;inset:0;background:
  radial-gradient(1200px 500px at 50% -10%,rgba(249,115,22,.08),transparent 60%),#08090b;
  display:flex;align-items:center;justify-content:center;padding:20px;z-index:200;}
.login-card{width:100%;max-width:370px;animation:rise .45s ease both;}
@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.login-logo{margin:0 auto 6px;display:flex;justify-content:center;}
.login-logo .plate{background:#fff;border-radius:14px;padding:14px 20px;box-shadow:0 14px 40px rgba(0,0,0,.5);}
.login-logo img{width:168px;height:auto;display:block;}
.login-title{text-align:center;font-family:var(--display);font-size:21px;font-weight:700;margin:16px 0 0;letter-spacing:.06em;text-transform:uppercase;}
.login-sub{text-align:center;color:var(--ink-faint);font-size:12px;margin:4px 0 26px;letter-spacing:.14em;text-transform:uppercase;}
.f-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);margin-bottom:6px;display:block;font-weight:700;}
.user-select-btn{width:100%;background:var(--steel);border:1px solid var(--rivet);border-radius:var(--r-md);padding:13px 14px;color:var(--ink);font-size:15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;transition:border-color .15s;}
.user-select-btn:hover{border-color:var(--rivet-hi);}
.user-select-btn.placeholder{color:var(--ink-faint);}
.user-dropdown{max-height:224px;overflow-y:auto;background:var(--steel);border:1px solid var(--rivet);border-radius:var(--r-md);margin:-8px 0 14px;padding:6px;}
.user-item{padding:10px 12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;font-size:14.5px;cursor:pointer;}
.user-item:hover{background:var(--steel2);}
.user-item.selected{color:var(--accent);background:var(--accent-soft);}
.admin-badge{font-size:9.5px;background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.pw-input{width:100%;background:var(--steel);border:1px solid var(--rivet);border-radius:var(--r-md);padding:13px 14px;color:var(--ink);font-size:15px;margin-bottom:10px;letter-spacing:4px;font-family:var(--mono);}
.login-error{color:var(--danger);font-size:12.5px;margin:0 0 12px;min-height:16px;}
.btn-primary{width:100%;background:var(--accent);color:#14100c;border:none;border-radius:var(--r-md);padding:13px;font-weight:700;font-size:14px;font-family:var(--display);letter-spacing:.08em;text-transform:uppercase;transition:background .15s;}
.btn-primary:hover{background:var(--accent-hot);}
.btn-primary:disabled{background:#2b313b;color:#6b7280;}
.store-note{text-align:center;color:var(--ink-faint);font-size:11px;margin-top:20px;display:flex;align-items:center;justify-content:center;gap:6px;}

/* ============ RAIL (desktop) ============ */
.rail{display:none;}
@media(min-width:1024px){
  .rail{display:flex;flex-direction:column;width:224px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--rivet);}
}
.rail-head{padding:18px 16px 14px;border-bottom:1px solid var(--rivet);}
.rail-head .plate{background:#fff;border-radius:10px;padding:8px 12px;display:inline-block;}
.rail-head img{height:24px;width:auto;display:block;}
.rail-head .sub{font-size:10px;color:var(--ink-faint);letter-spacing:.16em;text-transform:uppercase;margin-top:10px;font-weight:700;}
.rail-items{flex:1;overflow-y:auto;padding:10px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;color:var(--ink-dim);font-size:13.5px;font-weight:600;position:relative;cursor:pointer;border-left:3px solid transparent;transition:background .12s,color .12s;}
.nav-item:hover{background:var(--steel);color:var(--ink);}
.nav-item.active{background:var(--accent-soft);color:var(--accent);border-left-color:var(--accent);}
.nav-badge{margin-left:auto;background:var(--accent);color:#14100c;font-size:10px;font-weight:800;border-radius:20px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 5px;font-family:var(--display);}
.nav-divider{height:1px;background:var(--rivet);margin:8px 6px;}
.nav-label{font-size:9.5px;color:var(--ink-faint);letter-spacing:.14em;text-transform:uppercase;font-weight:700;padding:10px 12px 4px;}
.rail-foot{padding:14px;border-top:1px solid var(--rivet);display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;font-family:var(--display);}
.rail-foot .nm{font-size:13px;font-weight:700;}
.rail-foot .role{font-size:10px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;}

/* ============ MAIN COLUMN ============ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}

/* ============ HEADER ============ */
header.topbar{flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--rivet);
  display:flex;align-items:center;justify-content:space-between;padding:10px 14px;gap:10px;}
.hleft{display:flex;align-items:center;gap:10px;min-width:0;}
.icon-btn{width:38px;height:38px;border-radius:10px;background:transparent;border:none;color:var(--ink-dim);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;transition:background .12s,color .12s;}
.icon-btn:hover{background:var(--steel2);color:var(--ink);}
#hamburger-btn{display:flex;}
@media(min-width:1024px){#hamburger-btn{display:none;} .topbar .logo-badge{display:none;}}
.logo-badge{background:#fff;border-radius:8px;padding:3px 8px;display:inline-flex;align-items:center;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:10px;min-width:0;}
.brand-title{font-family:var(--display);font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;line-height:1.1;}
.brand-user{font-size:10px;color:var(--ink-faint);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hright{display:flex;align-items:center;gap:2px;}
.cart-badge{position:absolute;top:2px;right:2px;background:var(--accent);color:#14100c;font-size:9px;font-weight:800;
  border-radius:20px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;font-family:var(--display);}

/* ============ STATUS ============ */
.status-bar{flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--rivet);padding:7px 16px;font-size:11.5px;
  display:flex;align-items:center;gap:8px;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor;}
.status-open{color:#7fe0a5;} .status-open .status-dot{background:var(--ok);color:var(--ok);}
.status-closed{color:#f5a093;} .status-closed .status-dot{background:var(--danger);color:var(--danger);}
.low-banner{flex-shrink:0;background:linear-gradient(90deg,rgba(255,90,72,.14),rgba(255,90,72,.05));border-bottom:1px solid rgba(255,90,72,.3);
  padding:8px 16px;font-size:12px;color:#ffb0a5;display:flex;align-items:center;gap:8px;cursor:pointer;}
.low-banner b{color:#ff8d7f;}
.low-banner .go{margin-left:auto;font-weight:700;color:var(--danger);white-space:nowrap;}

/* ============ SEARCH + TOOLBAR ============ */
.searchbar{flex-shrink:0;background:var(--panel);padding:12px 14px 8px;display:flex;gap:8px;}
.search-input-wrap{flex:1;position:relative;display:flex;align-items:center;background:var(--steel);
  border:1px solid var(--rivet);border-radius:var(--r-md);padding:0 10px;transition:border-color .15s;}
.search-input-wrap:focus-within{border-color:var(--accent);}
.search-input-wrap input{flex:1;background:transparent;border:none;color:var(--ink);padding:12px 6px;font-size:14px;outline:none;min-width:0;}
.search-clear-btn{color:var(--ink-faint);width:26px;height:26px;background:none;border:none;display:flex;align-items:center;justify-content:center;}
.search-go-btn{width:46px;flex-shrink:0;border-radius:var(--r-md);background:var(--accent);border:none;color:#14100c;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.search-go-btn:hover{background:var(--accent-hot);}
.recent-row{flex-shrink:0;display:flex;gap:6px;overflow-x:auto;padding:0 14px 8px;background:var(--panel);align-items:center;}
.recent-lbl{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.1em;font-weight:700;flex-shrink:0;}
.recent-chip{flex-shrink:0;padding:5px 11px;border-radius:20px;font-size:11.5px;background:var(--steel);color:var(--ink-dim);border:1px solid var(--rivet);white-space:nowrap;cursor:pointer;}
.recent-chip:hover{color:var(--ink);border-color:var(--rivet-hi);}
.toolbar{flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--rivet);padding:0 14px 10px;display:flex;gap:8px;align-items:center;}
.chips{flex:1;display:flex;gap:6px;overflow-x:auto;min-width:0;padding:2px 0;}
.chip{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;background:var(--steel);color:var(--ink-dim);border:1px solid var(--rivet);white-space:nowrap;transition:all .12s;}
.chip:hover{border-color:var(--rivet-hi);color:var(--ink);}
.chip.active{background:var(--accent);color:#14100c;border-color:var(--accent);}
.chip.warn{color:#ff9d90;border-color:rgba(255,90,72,.35);}
.chip.warn.active{background:var(--danger);color:#1a0c0a;border-color:var(--danger);}
.tb-controls{display:flex;gap:6px;flex-shrink:0;align-items:center;}
.sort-select{background:var(--steel);border:1px solid var(--rivet);color:var(--ink-dim);border-radius:var(--r-sm);padding:7px 8px;font-size:11.5px;font-weight:600;}
.view-toggle{display:flex;background:var(--steel);border:1px solid var(--rivet);border-radius:var(--r-sm);overflow:hidden;}
.view-toggle button{width:32px;height:31px;background:none;border:none;color:var(--ink-faint);display:flex;align-items:center;justify-content:center;}
.view-toggle button.active{background:var(--steel2);color:var(--accent);}

/* ============ CATALOG ============ */
.grid-wrap{flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom));}
@media(max-width:1023px){.grid-wrap{padding-bottom:82px;}}
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:1400px;margin:0 auto;}
@media(min-width:560px){.pgrid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:820px){.pgrid{grid-template-columns:repeat(4,1fr);gap:12px;}}
@media(min-width:1240px){.pgrid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1560px){.pgrid{grid-template-columns:repeat(6,1fr);}}
.card{background:var(--steel);border:1px solid var(--rivet);border-radius:var(--r-lg);overflow:hidden;position:relative;cursor:pointer;
  transition:border-color .15s,transform .12s,box-shadow .15s;}
.card:hover{border-color:rgba(249,115,22,.45);transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.35);}
.card:active{transform:scale(.98);}
.card-photo{height:124px;background:linear-gradient(150deg,#20242c,#12151a);display:flex;align-items:center;justify-content:center;color:#39404c;position:relative;}
.card-photo img{width:100%;height:100%;object-fit:cover;}
.qty-pill{position:absolute;top:8px;right:8px;font-family:var(--display);font-weight:700;font-size:13px;padding:3px 9px;border-radius:8px;
  background:rgba(10,12,14,.82);backdrop-filter:blur(4px);border:1px solid transparent;}
.qty-pill.ok{color:var(--ok);border-color:rgba(47,203,111,.35);}
.qty-pill.low{color:var(--danger);border-color:rgba(255,90,72,.4);}
.qty-pill small{font-size:9px;color:var(--ink-faint);font-weight:600;margin-left:2px;font-family:var(--body);}
.card-body{padding:10px 11px 11px;}
.pn-plate{display:inline-block;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--accent);letter-spacing:.05em;
  background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.22);border-radius:6px;padding:2px 7px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-name{font-size:12.5px;font-weight:600;margin:6px 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.loc-chip{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--ink-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.loc-chip svg{flex-shrink:0;}
.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.low-tag{display:flex;align-items:center;gap:4px;color:#ff9d90;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.card-add{width:32px;height:32px;border-radius:9px;background:var(--accent-soft);border:1px solid rgba(249,115,22,.25);color:var(--accent);display:flex;align-items:center;justify-content:center;transition:background .12s;}
.card-add:hover{background:rgba(249,115,22,.25);}
/* list view */
.plist{display:flex;flex-direction:column;gap:8px;max-width:980px;margin:0 auto;}
.lrow{display:flex;align-items:center;gap:12px;background:var(--steel);border:1px solid var(--rivet);border-radius:var(--r-md);padding:9px 12px;cursor:pointer;transition:border-color .15s;}
.lrow:hover{border-color:rgba(249,115,22,.4);}
.lrow .thumb{width:46px;height:46px;border-radius:9px;background:linear-gradient(150deg,#20242c,#12151a);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#39404c;overflow:hidden;}
.lrow .thumb img{width:100%;height:100%;object-fit:cover;}
.lrow .mid{flex:1;min-width:0;}
.lrow .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}
.lrow .qcol{text-align:right;flex-shrink:0;font-family:var(--display);font-weight:700;font-size:16px;}
.lrow .qcol.ok{color:var(--ok);} .lrow .qcol.low{color:var(--danger);}
.lrow .qcol small{display:block;font-size:9px;color:var(--ink-faint);font-family:var(--body);font-weight:600;letter-spacing:.04em;}
.empty-state,.loading-state{text-align:center;padding:80px 20px;color:var(--ink-faint);}
.empty-state svg,.loading-state svg{margin-bottom:12px;opacity:.45;}
.empty-state p,.loading-state p{margin:2px 0;font-size:13.5px;}
.empty-state .big{color:var(--ink-dim);font-size:15px;font-weight:700;font-family:var(--display);letter-spacing:.04em;}
.spin{animation:spin 1s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}

/* ============ BOTTOM TAB BAR (mobile) ============ */
.tabbar{display:none;}
@media(max-width:1023px){
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:65;display:flex;background:rgba(14,16,20,.96);backdrop-filter:blur(10px);
    border-top:1px solid var(--rivet);padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border:none;background:none;color:var(--ink-faint);font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;position:relative;border-radius:10px;}
  .tab.active{color:var(--accent);}
  .tab.active::after{content:'';position:absolute;top:-7px;left:20%;right:20%;height:3px;border-radius:0 0 4px 4px;
    background:repeating-linear-gradient(135deg,var(--accent) 0 6px,transparent 6px 12px);}
  .tab .tb-badge{position:absolute;top:2px;right:calc(50% - 20px);background:var(--accent);color:#14100c;font-size:9px;font-weight:800;border-radius:20px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;font-family:var(--display);}
}

/* ============ MODAL ============ */
.overlay{position:fixed;inset:0;background:rgba(4,5,7,.82);z-index:70;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
@media(min-width:700px){.overlay{align-items:center;padding:24px;}}
.modal{background:var(--panel);border:1px solid rgba(249,115,22,.22);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:94vh;
  display:flex;flex-direction:column;overflow:hidden;animation:sheet .22s ease both;}
@keyframes sheet{from{transform:translateY(24px);opacity:.6;}to{transform:none;opacity:1;}}
.modal.wide{max-width:960px;}
@media(min-width:700px){.modal{border-radius:18px;}}
.drag-handle{width:38px;height:4px;background:#3a4150;border-radius:4px;margin:10px auto 0;flex-shrink:0;}
@media(min-width:700px){.drag-handle{display:none;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--rivet);flex-shrink:0;gap:10px;}
.modal-head h3{margin:0;font-size:15px;font-weight:700;font-family:var(--display);letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.modal-body{overflow-y:auto;padding:16px;flex:1;}
.x-btn{width:32px;height:32px;border-radius:9px;background:var(--steel2);border:none;color:var(--ink-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.x-btn:hover{color:var(--ink);}

/* ============ FORMS ============ */
.f-input,.f-textarea,.f-select{width:100%;background:var(--steel);border:1px solid var(--rivet);border-radius:10px;padding:11px 12px;color:var(--ink);font-size:14px;outline:none;transition:border-color .15s;}
.f-input:focus,.f-textarea:focus{border-color:var(--accent);}
.f-textarea{resize:vertical;min-height:56px;}
.f-group{margin-bottom:13px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-grid .full{grid-column:1/-1;}

/* ============ DETAIL ============ */
.detail-photo{width:100%;max-height:230px;border-radius:14px;overflow:hidden;background:linear-gradient(150deg,#20242c,#12151a);
  display:flex;align-items:center;justify-content:center;color:#39404c;margin-bottom:14px;}
.detail-photo img{width:100%;max-height:230px;object-fit:cover;}
.pn-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.pn-row .pn-plate{font-size:13px;padding:4px 11px;}
.copy-btn{display:flex;align-items:center;gap:5px;background:var(--steel2);border:1px solid var(--rivet);color:var(--ink-dim);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;}
.copy-btn:hover{color:var(--ink);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-card{background:var(--steel);border:1px solid var(--rivet);border-radius:10px;padding:10px 12px;}
.info-card.full{grid-column:1/-1;}
.info-card .lbl{font-size:9.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.09em;font-weight:700;margin-bottom:3px;}
.info-card .val{font-size:14px;font-weight:600;}
.info-card .val.num{font-family:var(--display);font-size:17px;}
.btn-danger{width:100%;background:var(--danger);color:#1a0c0a;border:none;border-radius:var(--r-md);padding:13px;font-weight:700;font-size:13.5px;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--display);letter-spacing:.06em;text-transform:uppercase;}
.btn-danger:hover{filter:brightness(1.08);}
.btn-danger:disabled,.btn-green:disabled{background:#2b313b;color:#6b7280;filter:none;}
.btn-sec{width:100%;background:var(--steel2);color:var(--ink);border:1px solid var(--rivet);border-radius:var(--r-md);padding:12px;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-sec:hover{border-color:var(--rivet-hi);}
.qty-stepper{display:flex;align-items:center;justify-content:center;gap:16px;margin:6px 0 4px;}
.qty-stepper button{width:44px;height:44px;border-radius:12px;background:var(--steel2);border:1px solid var(--rivet);color:var(--ink);font-size:20px;display:flex;align-items:center;justify-content:center;}
.qty-stepper .val{font-size:30px;font-weight:700;min-width:60px;text-align:center;font-family:var(--display);}
.avail-card{text-align:center;background:var(--steel);border:1px solid var(--rivet);border-radius:var(--r-md);padding:14px;margin-bottom:14px;}
.avail-card .num{font-size:34px;font-weight:700;color:var(--ok);font-family:var(--display);}
.avail-card .lbl{font-size:11px;color:var(--ink-faint);letter-spacing:.05em;}
.photo-req-box{border:1.5px dashed var(--rivet-hi);border-radius:12px;padding:14px;text-align:center;position:relative;transition:border-color .15s;}
.photo-req-box.filled{border-color:var(--ok);border-style:solid;background:rgba(47,203,111,.05);}
.photo-preview{width:80px;height:80px;object-fit:cover;border-radius:10px;margin:6px auto;display:block;}
.photo-req-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.edit-hint{background:var(--accent-soft);border:1px solid rgba(249,115,22,.3);color:#f5b98a;font-size:12px;border-radius:10px;padding:9px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* ============ CART ============ */
.cart-sheet{position:fixed;left:0;right:0;bottom:0;z-index:80;background:var(--panel);border-top:1px solid rgba(249,115,22,.25);
  border-radius:20px 20px 0 0;max-height:72vh;display:flex;flex-direction:column;box-shadow:0 -16px 50px rgba(0,0,0,.55);animation:sheet .2s ease both;}
@media(min-width:1024px){.cart-sheet{left:auto;right:20px;bottom:20px;width:420px;border-radius:18px;border:1px solid rgba(249,115,22,.25);max-height:70vh;}}
.cart-list{overflow-y:auto;padding:4px 14px 10px;flex:1;}
.cart-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--rivet);}
.cart-item:last-child{border-bottom:none;}
.cart-thumb{width:48px;height:48px;border-radius:10px;background:linear-gradient(150deg,#20242c,#12151a);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#39404c;overflow:hidden;}
.cart-thumb img{width:100%;height:100%;object-fit:cover;}
.cart-info{flex:1;min-width:0;}
.cart-info .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.cart-stepper{display:flex;align-items:center;gap:8px;background:var(--steel);border:1px solid var(--rivet);border-radius:10px;padding:3px;}
.cart-stepper button{width:30px;height:30px;border-radius:7px;background:var(--steel2);border:none;color:var(--ink);display:flex;align-items:center;justify-content:center;}
.cart-stepper span{min-width:18px;text-align:center;font-weight:700;font-size:13px;font-family:var(--display);}
.cart-remove{width:30px;height:30px;border-radius:7px;background:none;border:none;color:var(--ink-faint);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cart-remove:hover{color:var(--danger);}
.cart-summary{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--steel);border-top:1px solid var(--rivet);border-bottom:1px solid var(--rivet);font-size:12px;color:var(--ink-dim);flex-shrink:0;}
.cart-summary b{color:var(--ink);font-size:15px;font-family:var(--display);}
.cart-footer{padding:12px 14px 16px;border-top:1px solid var(--rivet);flex-shrink:0;}
.btn-green{width:100%;background:var(--ok);color:#0a1a10;border:none;border-radius:var(--r-md);padding:14px;font-weight:700;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--display);letter-spacing:.06em;text-transform:uppercase;}
.btn-green:hover{filter:brightness(1.07);}
.link-btn{background:none;border:none;color:var(--danger);font-size:12.5px;font-weight:700;}

/* ============ DRAWER (mobile) ============ */
.sb-overlay{position:fixed;inset:0;background:rgba(4,5,7,.6);z-index:75;}
.sidebar{position:absolute;left:0;top:0;bottom:0;width:min(260px,84vw);background:var(--panel);border-right:1px solid var(--rivet);
  display:flex;flex-direction:column;box-shadow:12px 0 40px rgba(0,0,0,.5);animation:drawer .2s ease both;}
@keyframes drawer{from{transform:translateX(-20px);opacity:.5;}to{transform:none;opacity:1;}}

/* ============ CHECKOUT ============ */
.co-section{margin-bottom:20px;}
.co-section-title{font-size:11px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:flex;align-items:center;gap:6px;font-family:var(--display);}
.co-section-hint{font-size:11.5px;color:var(--ink-faint);margin-bottom:10px;line-height:1.45;}
.co-items-list{background:var(--steel);border:1px solid var(--rivet);border-radius:12px;padding:4px 12px;}
.co-summary-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--steel);border:1px solid var(--rivet);
  color:var(--ink-dim);border-radius:12px;padding:12px 14px;font-size:13px;font-weight:700;}
.co-summary-toggle:hover{border-color:var(--rivet-hi);color:var(--ink);}
.co-chev{transition:transform .15s;flex-shrink:0;}
.co-chev-open{transform:rotate(180deg);}
.selfie-box{border:1.5px dashed var(--rivet-hi);border-radius:14px;padding:16px;text-align:center;position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;transition:border-color .15s;}
.selfie-box.filled{border-color:var(--ok);border-style:solid;background:rgba(47,203,111,.05);}
.selfie-box img{width:66px;height:66px;object-fit:cover;border-radius:50%;border:2px solid var(--ok);}
.selfie-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.material-photos{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.material-slot{border:1.5px dashed var(--rivet-hi);border-radius:14px;padding:14px 8px;text-align:center;position:relative;min-height:112px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:border-color .15s;}
.material-slot.filled{border-color:var(--ok);border-style:solid;padding:6px;}
.material-slot img{width:100%;height:80px;object-fit:cover;border-radius:9px;}
.material-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.material-slot .opt{font-size:9.5px;color:var(--ink-faint);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;}
.co-remove-x{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(4,5,7,.75);border:none;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;z-index:2;}

/* ============ LISTS / HISTORY ============ */
.list-search{display:flex;gap:8px;margin-bottom:12px;}
.hist-item{background:var(--steel);border:1px solid var(--rivet);border-radius:12px;padding:11px 12px;margin-bottom:8px;}
.hist-top{display:flex;align-items:center;gap:10px;}
.hist-top .ic{color:var(--accent);flex-shrink:0;}
.hist-top .mid{flex:1;min-width:0;}
.hist-top .nm{font-size:13.5px;font-weight:600;}
.hist-top .qty{font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0;font-family:var(--display);}
.hist-meta{font-size:11px;color:var(--ink-faint);margin-top:3px;}
.hist-expand{margin-top:10px;padding-top:10px;border-top:1px solid var(--rivet);font-size:12.5px;color:var(--ink-dim);}
.hist-expand .row{margin-bottom:6px;}
.hist-expand b{color:var(--ink);}
.print-btn{background:var(--steel2);border:none;color:var(--ink-dim);width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.print-btn:hover{color:var(--ink);}
.pill-count{font-size:11px;color:var(--ink-faint);font-weight:700;margin-bottom:10px;letter-spacing:.05em;text-transform:uppercase;}

/* ============ IMPORT/EXPORT ============ */
.dropzone{border:1.5px dashed var(--rivet-hi);border-radius:14px;padding:28px 14px;text-align:center;color:var(--ink-faint);position:relative;margin-bottom:12px;transition:all .15s;}
.dropzone.drag{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.warn-box{background:rgba(255,90,72,.1);border:1px solid rgba(255,90,72,.3);color:#ffb0a5;font-size:12.5px;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.info-box{background:var(--accent-soft);border:1px solid rgba(249,115,22,.3);color:#f5b98a;font-size:12.5px;border-radius:10px;padding:10px 12px;margin-bottom:12px;line-height:1.5;}
.excel-cols{font-size:11.5px;color:var(--ink-faint);background:var(--steel);border-radius:8px;padding:9px 11px;margin-bottom:10px;font-family:var(--mono);}
.section-title{font-size:11px;font-weight:700;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.08em;margin:22px 0 10px;display:flex;align-items:center;gap:6px;font-family:var(--display);}
.section-title:first-child{margin-top:0;}

/* ============ KPI ============ */
.kpi-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
@media(min-width:640px){.kpi-cards{grid-template-columns:repeat(4,1fr);}}
.kpi-card{background:var(--steel);border:1px solid var(--rivet);border-radius:14px;padding:13px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:currentColor;opacity:.7;}
.kpi-card .num{font-size:26px;font-weight:700;font-family:var(--display);}
.kpi-card .lbl{font-size:10px;color:var(--ink-faint);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.07em;}
.chart-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:800px){.chart-grid{grid-template-columns:1fr 1fr;}}
.chart-box{background:var(--steel);border:1px solid var(--rivet);border-radius:14px;padding:14px;}
.chart-box.span2{grid-column:1/-1;}
.chart-box h4{margin:0 0 10px;font-size:11px;color:var(--ink-dim);font-weight:700;text-transform:uppercase;letter-spacing:.07em;font-family:var(--display);}
.chart-box canvas{max-height:220px;}
.rank-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.rank-table th{text-align:left;color:var(--ink-faint);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:4px 6px;border-bottom:1px solid var(--rivet);}
.rank-table td{padding:8px 6px;border-bottom:1px solid var(--rivet);}
.rank-table td.rk{font-weight:700;color:var(--ink-faint);font-family:var(--display);}
.rank-table tr:nth-child(-n+3) td.rk{color:var(--accent);}
.rank-table td.pn{color:var(--accent);font-weight:700;font-family:var(--mono);font-size:11.5px;}
.rank-table td.qty{color:var(--ok);font-weight:700;text-align:right;font-family:var(--display);}

/* ============ MISC ============ */
.hidden{display:none !important;}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:var(--steel2);border:1px solid var(--rivet-hi);
  color:var(--ink);padding:11px 18px;border-radius:12px;font-size:13px;z-index:300;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:rise .25s ease both;}
@media(min-width:1024px){.toast{bottom:24px;}}
@media(max-width:380px){
  .modal-body{padding:12px;}
  .material-photos{gap:8px;}
  .material-slot{min-height:98px;padding:10px 6px;}
  .kpi-cards{gap:8px;}
  .info-grid{gap:6px;}
}
@media(max-width:340px){.material-photos{grid-template-columns:1fr;}}
@media(hover:none) and (pointer:coarse){
  .icon-btn{width:42px;height:42px;}
  .nav-item{padding:14px 12px;}
  .card-add{width:36px;height:36px;}
  .chip{padding:8px 14px;}
}
</style>

/* ---------- Storage ---------- */
async function getJSON(key, fallback){
  try{ const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : fallback; }
  catch(e){ return fallback; }
}
async function setJSON(key, val){
  try{ await window.storage.set(key, JSON.stringify(val), true); }catch(e){ console.error('storage set fail',key,e); }
}
async function getFoto(pn){
  try{ const r = await window.storage.get('foto:'+pn, true); return r ? r.value : null; }
  catch(e){ return null; }
}
async function setFoto(pn, base64){ await window.storage.set('foto:'+pn, base64, true); }

const S = {
  ready:false, user:null,
  loginSel:null, loginErr:'', loginPw:'', userDDOpen:false,
  pecas:{}, retiradas:[], pesquisas:[], logins:[],
  fotoCache:{},
  search:'', catFilter:'all', sortBy:'nome', view:'grid', searchFocus:false,
  sidebarOpen:false, cartOpen:false, cart:[],
  modal:null, modalData:null, detailEdit:false,
  histSearch:'', expandedHist:null,
  dragOverPhotos:false, dragOverExcel:false,
  photoUploadReport:null, excelImportReport:null,
  retirarQtd:1, retirarFoto:null, retirarNome:'', retirarObs:'',
  checkoutNumeroPedido:'', checkoutRC:'', checkoutResponsavel:'', checkoutSelfie:null, checkoutMaterialFotos:[null,null], checkoutWA:true, checkoutItemsOpen:false,
};

function toast(msg){
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

/* ---------- Boot ---------- */
async function boot(){
  S.pecas = await getJSON('pecas', {});
  S.retiradas = await getJSON('retiradas', []);
  S.pesquisas = await getJSON('pesquisas', []);
  S.logins = await getJSON('logins', []);
  S.ready = true;
  render();
}
boot();
setInterval(()=>{ if(S.user && !S.modal && !S.cartOpen) render(); }, 60000);

/* ---------- Utils ---------- */
function pecasArr(){ return Object.values(S.pecas); }
function categorias(){
  const set = new Set();
  pecasArr().forEach(p=>{ if(p.categoria) set.add(p.categoria); });
  return [...set];
}
function lowStock(p){ return p.qtd <= (p.minimo||0); }
function lowCount(){ return pecasArr().filter(lowStock).length; }
function noPhotoCount(){ return pecasArr().filter(p=>S.fotoCache[p.pn]===null || S.fotoCache[p.pn]===undefined ? !S.fotoCache[p.pn] : false).length; }
function filteredPecas(){
  let arr = pecasArr();
  if(S.catFilter==='__low') arr = arr.filter(lowStock);
  else if(S.catFilter==='__nophoto') arr = arr.filter(p=>!S.fotoCache[p.pn]);
  else if(S.catFilter!=='all') arr = arr.filter(p=>p.categoria===S.catFilter);
  if(S.search.trim()){
    const q = S.search.trim().toLowerCase();
    arr = arr.filter(p => (p.pn||'').toLowerCase().includes(q) || (p.descricao||'').toLowerCase().includes(q)
      || (p.nome||'').toLowerCase().includes(q) || (p.endereco||'').toLowerCase().includes(q) || (p.coluna||'').toLowerCase().includes(q));
  }
  if(S.sortBy==='qtd-asc') arr = [...arr].sort((a,b)=>a.qtd-b.qtd);
  else if(S.sortBy==='qtd-desc') arr = [...arr].sort((a,b)=>b.qtd-a.qtd);
  else arr = [...arr].sort((a,b)=> (a.nome||a.descricao||'').localeCompare(b.nome||b.descricao||''));
  return arr;
}
function recentTerms(){
  const seen = new Set(); const out = [];
  for(const p of S.pesquisas){
    const t = (p.termo||'').trim();
    if(!t || seen.has(t.toLowerCase())) continue;
    seen.add(t.toLowerCase()); out.push(t);
    if(out.length>=6) break;
  }
  return out;
}
function isLojaAberta(){
  const now = new Date();
  const [ah,am] = HORA_ABRE.split(':').map(Number);
  const [fh,fm] = HORA_FECHA.split(':').map(Number);
  const mins = now.getHours()*60+now.getMinutes();
  return mins >= ah*60+am && mins <= fh*60+fm;
}
function fmtData(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function initials(nome){ return nome.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function cartCount(){ return S.cart.reduce((a,c)=>a+c.qtd,0); }
function resetCheckout(){ S.checkoutNumeroPedido=''; S.checkoutRC=''; S.checkoutResponsavel=''; S.checkoutSelfie=null; S.checkoutMaterialFotos=[null,null]; S.checkoutWA=true; S.checkoutItemsOpen=false; }
function checkoutCanSend(){ return (S.checkoutRC||'').trim().length>0 && !!S.checkoutSelfie && S.checkoutMaterialFotos.some(f=>f); }

async function registrarLogin(nome, admin){
  S.logins.unshift({nome, admin, data:new Date().toISOString()});
  await setJSON('logins', S.logins);
}
async function registrarPesquisa(termo, resultados){
  if(!termo || termo.trim().length<1) return;
  S.pesquisas.unshift({termo, resultados, usuario:S.user.nome, data:new Date().toISOString()});
  await setJSON('pesquisas', S.pesquisas);
}

async function confirmarRetirada({pn, qtd, responsavel, observacao, fotoBase64, tipo, rc, numeroPedido, selfie, materialFotos}){
  const peca = S.pecas[pn];
  if(!peca) return false;
  if(qtd > peca.qtd){ toast('Quantidade maior que o disponível'); return false; }
  peca.qtd -= qtd;
  await setJSON('pecas', S.pecas);
  const r = {
    id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    pn, nome:peca.nome||peca.descricao, qtd,
    responsavel:responsavel||'', observacao:observacao||'', foto:fotoBase64||null,
    rc:rc||null, numeroPedido:numeroPedido||null, selfie:selfie||null, materialFotos:materialFotos||null,
    data:new Date().toISOString(), usuario:S.user.nome, tipo:tipo||'presencial'
  };
  S.retiradas.unshift(r);
  await setJSON('retiradas', S.retiradas);
  return true;
}

function fileToCompressedBase64(file, maxDim=700, quality=.75){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width,h=img.height;
        if(w>h && w>maxDim){ h=h*maxDim/w; w=maxDim; } else if(h>maxDim){ w=w*maxDim/h; h=maxDim; }
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality));
      };
      img.onerror=()=>resolve(null);
      img.src = e.target.result;
    };
    reader.onerror=()=>resolve(null);
    reader.readAsDataURL(file);
  });
}

/* ============================= RENDER ============================= */
function render(){
  const root = document.getElementById('app');
  if(!S.ready){ root.innerHTML = `<div class="loading-state" style="margin:auto">${ic('refresh',30,'spin')}<p>Carregando...</p></div>`; return; }
  if(!S.user){ root.innerHTML = renderLogin(); attachLoginEvents(); return; }

  root.innerHTML = renderRail() + `<div class="main">` +
    renderHeader() + `<div class="hazard"></div>` + renderStatusBar() + renderLowBanner() +
    renderSearch() + renderRecentRow() + renderToolbar() + renderCatalog() +
  `</div>` + renderTabbar();

  let extra = '';
  if(S.sidebarOpen) extra += renderDrawer();
  if(S.cartOpen) extra += renderCart();
  if(S.modal) extra += renderModal();
  root.insertAdjacentHTML('beforeend', extra);

  attachGlobalEvents();
}

/* ---------- LOGIN ---------- */
function renderLogin(){
  const sel = S.loginSel;
  return `
  <div class="login-screen">
    <div class="login-card">
      <div class="login-logo"><span class="plate"><img src="${LOGO_URI}" alt="ZAMine"></span></div>
      <h1 class="login-title">Estoque de Peças</h1>
      <p class="login-sub">Unidade Goiás</p>

      <span class="f-label">Usuário</span>
      <button class="user-select-btn ${sel?'':'placeholder'}" data-action="toggle-user-dd">
        <span>${sel ? sel : 'Selecione um usuário'}</span>
        ${ic('chevdown',18)}
      </button>
      ${S.userDDOpen ? `<div class="user-dropdown">
        ${USERS.map(u=>`<div class="user-item ${u.nome===sel?'selected':''}" data-action="pick-user" data-nome="${u.nome}">
          <span>${u.nome}</span>${u.admin?`<span class="admin-badge">Admin</span>`:''}
        </div>`).join('')}
      </div>`:''}

      <span class="f-label">Senha</span>
      <input class="pw-input" type="password" id="login-pw" placeholder="••••" maxlength="8" value="${S.loginPw||''}">
      <p class="login-error">${S.loginErr||''}</p>
      <button class="btn-primary" data-action="do-login">Entrar</button>
      <p class="store-note">${ic('clock',13)} Atendimento: ${HORA_ABRE} às ${HORA_FECHA}</p>
    </div>
  </div>`;
}
function attachLoginEvents(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const a = el.dataset.action;
      if(a==='toggle-user-dd'){ S.userDDOpen=!S.userDDOpen; render(); }
      if(a==='pick-user'){ S.loginSel = el.dataset.nome; S.userDDOpen=false; S.loginErr=''; render(); }
      if(a==='do-login'){
        const pw = document.getElementById('login-pw').value;
        if(!S.loginSel){ S.loginErr='Selecione um usuário'; render(); return; }
        if(pw!==SENHA){ S.loginErr='Senha incorreta'; S.loginPw=pw; render(); return; }
        const u = USERS.find(x=>x.nome===S.loginSel);
        S.user = u; S.loginErr=''; S.loginPw=''; S.loginSel=null;
        await registrarLogin(u.nome, u.admin);
        render();
      }
    });
  });
  const pw = document.getElementById('login-pw');
  if(pw) pw.addEventListener('keydown', e=>{ if(e.key==='Enter') document.querySelector('[data-action="do-login"]').click(); });
}

function renderToolbar(){
  const cats = categorias();

/* ---------- CATALOG ---------- */
function renderCatalog(){
  const list = filteredPecas();
  if(!Object.keys(S.pecas).length){
    return `<div class="grid-wrap"><div class="empty-state">
      ${ic('package',42)}
      <p class="big">Nenhuma peça cadastrada</p>
      <p>${S.user.admin? 'Abra o menu e use "Importar" para subir sua planilha Excel.' : 'Aguarde o time cadastrar o estoque.'}</p>
    </div></div>`;
  }
  if(!list.length){
    return `<div class="grid-wrap"><div class="empty-state">
      ${ic('search',36)}
      <p class="big">Nenhuma peça encontrada</p>
      <p>Tente outro termo ou filtro</p>
    </div></div>`;
  }
  if(S.view==='list'){
    return `<div class="grid-wrap"><div class="plist">${list.map(p=>renderRow(p)).join('')}</div></div>`;
  }
  return `<div class="grid-wrap"><div class="pgrid">${list.map(p=>renderCard(p)).join('')}</div></div>`;
}
function ensureFoto(p){
  const foto = S.fotoCache[p.pn];
  if(foto===undefined){
    S.fotoCache[p.pn]=null;
    getFoto(p.pn).then(f=>{ S.fotoCache[p.pn]=f; if(f){ const el=document.querySelector(`img[data-pnimg="${p.pn}"]`); if(el) el.src=f; } });
  }
  return S.fotoCache[p.pn];
}
function locStr(p){ return [p.endereco,p.coluna].filter(Boolean).join(' · '); }
function renderCard(p){
  const low = lowStock(p);
  const foto = ensureFoto(p);
  const loc = locStr(p);
  return `
  <div class="card" data-action="open-detail" data-pn="${p.pn}">
    <div class="card-photo">
      ${foto? `<img data-pnimg="${p.pn}" src="${foto}" alt="">` : ic('package',30)}
      <span class="qty-pill ${low?'low':'ok'}">${p.qtd}<small>${p.unidade||'UN'}</small></span>
    </div>
    <div class="card-body">
      <span class="pn-plate">${p.pn}</span>
      <div class="card-name">${p.nome||p.descricao||'(sem nome)'}</div>
      ${loc?`<div class="loc-chip">${ic('pin',11)} ${loc}</div>`:''}
      <div class="card-foot">
        ${low?`<span class="low-tag">${ic('warn',11)} Baixo</span>`:'<span></span>'}
        <button class="card-add" data-action="cart-add" data-pn="${p.pn}" title="Adicionar ao carrinho">${ic('plus',16)}</button>
      </div>
    </div>
  </div>`;
}
function renderRow(p){
  const low = lowStock(p);
  const foto = ensureFoto(p);
  const loc = locStr(p);
  return `
  <div class="lrow" data-action="open-detail" data-pn="${p.pn}">
    <div class="thumb">${foto?`<img data-pnimg="${p.pn}" src="${foto}" alt="">`:ic('package',20)}</div>
    <div class="mid">
      <span class="pn-plate">${p.pn}</span>
      <div class="nm">${p.nome||p.descricao||'(sem nome)'}</div>
      ${loc?`<div class="loc-chip">${ic('pin',11)} ${loc}</div>`:''}
    </div>
    <div class="qcol ${low?'low':'ok'}">${p.qtd}<small>${p.unidade||'UN'}</small></div>
    <button class="card-add" data-action="cart-add" data-pn="${p.pn}" title="Adicionar">${ic('plus',16)}</button>
  </div>`;
}

/* ---------- MODAL WRAPPER ---------- */
function wrapModal(inner, {wide=false, title='', headRight=''}={}){
  return `<div class="overlay" data-action="close-modal-overlay">
    <div class="modal ${wide?'wide':''}">
      <div class="drag-handle"></div>
      <div class="modal-head">
        <h3>${title}</h3>
        <div style="display:flex;align-items:center;gap:8px">${headRight}
          <button class="x-btn" data-action="close-modal">${ic('x',16)}</button>
        </div>
      </div>
      <div class="modal-body">${inner}</div>
    </div>
  </div>`;
}
function renderModal(){
  switch(S.modal){
    case 'detail': return modalDetail();
    case 'retirar': return modalRetirar();
    case 'whatsapp': return modalWhatsapp();
    case 'retiradas': return modalRetiradasHist();
    case 'pesquisas': return modalPesquisas();
    case 'logins': return modalLogins();
    case 'kpis': return modalKpis();
    case 'importar': return S.user.admin ? modalImportar() : '';
    case 'exportar': return S.user.admin ? modalExportar() : '';
    default: return '';
  }
}

        <div class="full"><span class="f-label">Nome / Descrição</span><input class="f-input" id="pe-nome" value="${(p.nome||p.descricao||'').replace(/"/g,'&quot;')}"></div>

/* ---------- KPIs ---------- */
function computeKpis(){
  const mesesPt = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const byMonth={}, byMonthOrders={}, byUser={}, dayMap={};
  const now = new Date();
  for(let i=29;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i); const key=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); dayMap[key]=0; }
  let totalQty=0, currentMonthQty=0;
  const topMap={};
  S.retiradas.forEach(r=>{
    const d = new Date(r.data);
    const mk = mesesPt[d.getMonth()]+'/'+String(d.getFullYear()).slice(2);
    byMonth[mk]=(byMonth[mk]||0)+r.qtd;
    byMonthOrders[mk]=(byMonthOrders[mk]||0)+1;
    byUser[r.usuario]=(byUser[r.usuario]||0)+r.qtd;
    totalQty += r.qtd;
    if(d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()) currentMonthQty+=r.qtd;
    const dayKey = d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    if(dayKey in dayMap) dayMap[dayKey]+=r.qtd;
    topMap[r.pn] = (topMap[r.pn]||0)+r.qtd;
  });
  const top15 = Object.entries(topMap).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([pn,qty])=>({pn,qty,nome:(S.pecas[pn]?.nome||S.pecas[pn]?.descricao||'')}));
  return {
    stats:{ totalRetiradas:S.retiradas.length, totalQty, uniqueItems:new Set(S.retiradas.map(r=>r.pn)).size, currentMonthQty },
    byMonth, byMonthOrders, byUser, dayMap, top15
  };
}
function modalKpis(){
  const k = computeKpis();
  setTimeout(()=>drawCharts(k), 30);
  return wrapModal(`
    <div class="kpi-cards">
      <div class="kpi-card" style="color:var(--accent)"><div class="num">${k.stats.totalRetiradas}</div><div class="lbl">Total Pedidos</div></div>
      <div class="kpi-card" style="color:var(--ok)"><div class="num">${k.stats.totalQty}</div><div class="lbl">Itens Retirados</div></div>

let CHARTS=[];
function drawCharts(k){
  CHARTS.forEach(c=>c.destroy()); CHARTS=[];
  const gridColor='#22262e', tickColor='#8a93a0';
  const opts = ()=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:tickColor,font:{size:10}},grid:{color:gridColor}},y:{ticks:{color:tickColor,font:{size:10},precision:0},grid:{color:gridColor},beginAtZero:true}}});
  const mk = id => document.getElementById(id);
  const c1 = mk('ch-mes-itens');
  if(c1) CHARTS.push(new Chart(c1,{type:'bar',data:{labels:Object.keys(k.byMonth),datasets:[{data:Object.values(k.byMonth),backgroundColor:'#f97316',borderRadius:5}]},options:opts()}));
  const c2 = mk('ch-mes-pedidos');
  if(c2) CHARTS.push(new Chart(c2,{type:'bar',data:{labels:Object.keys(k.byMonthOrders),datasets:[{data:Object.values(k.byMonthOrders),backgroundColor:'#2fcb6f',borderRadius:5}]},options:opts()}));
  const c3 = mk('ch-30d');
  if(c3) CHARTS.push(new Chart(c3,{type:'line',data:{labels:Object.keys(k.dayMap),datasets:[{data:Object.values(k.dayMap),borderColor:'#2fcb6f',backgroundColor:'rgba(47,203,111,.14)',fill:true,tension:.3,pointRadius:0}]},options:opts()}));
  const c4 = mk('ch-user');
  const palette=['#f97316','#2fcb6f','#ff5a48','#ffc24b','#35c6d9','#8b5cf6','#ec4899'];
  if(c4){
    const labels=Object.keys(k.byUser), data=Object.values(k.byUser);
    CHARTS.push(new Chart(c4,{type:'bar',data:{labels,datasets:[{data,backgroundColor:labels.map((_,i)=>palette[i%palette.length]),borderRadius:5}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:tickColor,font:{size:10},precision:0},grid:{color:gridColor}},y:{ticks:{color:tickColor,font:{size:11}},grid:{display:false}}}}}));
  }
}

/* ============================= EVENTS ============================= */
function attachGlobalEvents(){
  document.body.onclick = async (e)=>{
    const el = e.target.closest('[data-action]');
    if(!el) return;
    await handleAction(el.dataset.action, el, e);
  };

  const si = document.getElementById('search-input');
  if(si){
    si.oninput = ()=>{ S.search = si.value; refreshCatalogOnly(); };
    si.onkeydown = (e)=>{ if(e.key==='Enter'){ e.preventDefault(); si.blur(); doSearchLog(); } };
    si.onfocus = ()=>{ if(!S.searchFocus){ S.searchFocus=true; renderRecentInPlace(); } };
    si.onblur = ()=>{ setTimeout(()=>{ S.searchFocus=false; renderRecentInPlace(); }, 180); };
  }
  document.querySelectorAll('.recent-chip').forEach(chip=>{
    chip.addEventListener('mousedown', (e)=>{ e.preventDefault(); S.search = chip.dataset.term; S.searchFocus=false; doSearchLog(); });
  });
  const ss = document.getElementById('sort-select');
  if(ss) ss.onchange = ()=>{ S.sortBy = ss.value; render(); };

  const hs = document.getElementById('hist-search-input');
  if(hs) hs.oninput = ()=>{ S.histSearch = hs.value; render(); const f=document.getElementById('hist-search-input'); if(f){ f.focus(); f.selectionStart=f.selectionEnd=f.value.length; } };

  const coRC = document.getElementById('co-rc');
  if(coRC) coRC.oninput = ()=>{ S.checkoutRC = coRC.value; updateCheckoutSendBtn(); };
  const coNum = document.getElementById('co-numero-pedido');
  if(coNum) coNum.oninput = ()=>{ S.checkoutNumeroPedido = coNum.value; };
  const coResp = document.getElementById('co-responsavel');
  if(coResp) coResp.oninput = ()=>{ S.checkoutResponsavel = coResp.value; };

  wirePhotoInputs();
  wireDropzones();
}
function updateCheckoutSendBtn(){
  const btn = document.querySelector('[data-action="finalizar-pedido"]');
  if(btn) btn.disabled = !checkoutCanSend();
}
function refreshCatalogOnly(){
  const wrap = document.querySelector('.grid-wrap');
  if(wrap) wrap.outerHTML = renderCatalog();
}
function renderRecentInPlace(){
  const existing = document.getElementById('recent-row');
  const html = renderRecentRow();
  if(existing && !html){ existing.remove(); return; }
  if(!existing && html){
    const sb = document.querySelector('.searchbar');
    if(sb){ sb.insertAdjacentHTML('afterend', html);
      document.querySelectorAll('.recent-chip').forEach(chip=>{
        chip.addEventListener('mousedown', (e)=>{ e.preventDefault(); S.search = chip.dataset.term; S.searchFocus=false; doSearchLog(); });
      });
    }
  }
}
async function doSearchLog(){
  const results = filteredPecas().length;
  await registrarPesquisa(S.search, results);
  render();
}

async function handleAction(a, el, e){
  if(a==='toggle-sidebar'){ S.sidebarOpen=!S.sidebarOpen; render(); return; }
  if(a==='close-sidebar'){ if(e.target!==el && a==='close-sidebar' && el.classList.contains('sb-overlay') && e.target!==el) return; S.sidebarOpen=false; render(); return; }
  if(a==='go-catalog'){ S.modal=null; S.modalData=null; S.cartOpen=false; S.sidebarOpen=false; render(); return; }
  if(a==='logout'){ S.user=null; S.cart=[]; S.modal=null; S.sidebarOpen=false; S.cartOpen=false; render(); return; }
  if(a==='toggle-cart'){ S.cartOpen=!S.cartOpen; S.sidebarOpen=false; S.modal=null; render(); return; }
  if(a==='open-modal'){ S.modal=el.dataset.modal; S.sidebarOpen=false; S.cartOpen=false; S.detailEdit=false; render(); return; }
  if(a==='close-modal'){ resetCheckout(); S.modal=null; S.modalData=null; S.detailEdit=false; S.retirarFoto=null; S.retirarQtd=1; render(); return; }
  if(a==='close-modal-overlay'){ if(e.target===el){ resetCheckout(); S.modal=null; S.modalData=null; S.detailEdit=false; S.retirarFoto=null; S.retirarQtd=1; render(); } return; }
  if(a==='set-cat'){ S.catFilter=el.dataset.cat; render(); return; }
  if(a==='filter-low'){ S.catFilter='__low'; render(); return; }
  if(a==='set-view'){ S.view=el.dataset.view; render(); return; }
  if(a==='clear-search'){ S.search=''; render(); return; }
  if(a==='do-search'){ doSearchLog(); return; }
  if(a==='hist-search-clear'){ S.histSearch=''; render(); return; }

  if(a==='cart-add'){ addToCart(el.dataset.pn); return; }
  if(a==='open-detail'){ S.modal='detail'; S.modalData=el.dataset.pn; S.detailEdit=false; S.cartOpen=false; render(); return; }
  if(a==='copy-pn'){
    try{ await navigator.clipboard.writeText(el.dataset.pn); toast('PN copiado'); }
    catch(err){ toast('Não foi possível copiar'); }
    return;
  }
  if(a==='toggle-detail-edit'){ if(S.user.admin){ S.detailEdit=!S.detailEdit; render(); } return; }
  if(a==='save-peca-edit'){
    const p = S.pecas[S.modalData]; if(!p) return;
    p.nome = document.getElementById('pe-nome')?.value || p.nome;
    p.descricao = p.nome;
    p.qtd = Math.max(0, parseInt(document.getElementById('pe-qtd')?.value)||0);
    p.minimo = Math.max(0, parseInt(document.getElementById('pe-minimo')?.value)||0);
    p.unidade = document.getElementById('pe-unidade')?.value || 'UN';
    p.categoria = document.getElementById('pe-categoria')?.value || '';
    p.endereco = document.getElementById('pe-endereco')?.value || '';
    p.coluna = document.getElementById('pe-coluna')?.value || '';
    await setJSON('pecas', S.pecas);
    S.detailEdit=false; toast('Peça atualizada'); render(); return;
  }
  if(a==='delete-peca'){
    const p = S.pecas[S.modalData]; if(!p) return;
    if(confirm(`Excluir a peça ${p.pn}? O histórico de retiradas será mantido.`)){
      delete S.pecas[S.modalData];
      await setJSON('pecas', S.pecas);
      S.modal=null; S.modalData=null; S.detailEdit=false;
      toast('Peça excluída'); render();
    }
    return;
  }
  if(a==='cart-inc'){ changeCartQty(el.dataset.pn,1); return; }
  if(a==='cart-dec'){ changeCartQty(el.dataset.pn,-1); return; }
  if(a==='cart-remove'){ S.cart = S.cart.filter(c=>c.pn!==el.dataset.pn); render(); return; }
  if(a==='cart-clear'){ S.cart=[]; render(); return; }

  if(a==='open-retirar'){ S.modal='retirar'; S.modalData=el.dataset.pn; S.retirarQtd=1; S.retirarFoto=null; S.cartOpen=false; render(); return; }
  if(a==='retirar-qtd'){
    const p = S.pecas[S.modalData]; const d=parseInt(el.dataset.d);
    S.retirarQtd = Math.max(1, Math.min((p?p.qtd:1), (S.retirarQtd||1)+d)); render(); return;
  }
  if(a==='confirmar-retirada'){
    const pn = S.modalData;
    const responsavel = document.getElementById('retirar-nome')?.value || '';
    const observacao = document.getElementById('retirar-obs')?.value || '';
    const ok = await confirmarRetirada({pn, qtd:S.retirarQtd||1, responsavel, observacao, fotoBase64:S.retirarFoto, tipo:'presencial'});
    if(ok){ toast('Retirada registrada'); S.modal=null; S.retirarFoto=null; S.retirarQtd=1; }
    render(); return;
  }

  if(a==='open-whatsapp-checkout'){ S.modal='whatsapp'; S.cartOpen=false; resetCheckout(); render(); return; }
  if(a==='toggle-checkout-items'){ S.checkoutItemsOpen=!S.checkoutItemsOpen; render(); return; }
  if(a==='co-remove-selfie'){ S.checkoutSelfie=null; render(); return; }
  if(a==='co-remove-material'){ S.checkoutMaterialFotos[parseInt(el.dataset.idx)]=null; render(); return; }
  if(a==='finalizar-pedido'){
    S.checkoutRC = document.getElementById('co-rc')?.value || S.checkoutRC;
    S.checkoutNumeroPedido = document.getElementById('co-numero-pedido')?.value || S.checkoutNumeroPedido;
    S.checkoutResponsavel = document.getElementById('co-responsavel')?.value || S.checkoutResponsavel;
    if(!checkoutCanSend()){ toast('Preencha o RC, a selfie e a foto do material'); return; }
    const waChk = document.getElementById('checkout-wa');
    const sendWA = waChk ? waChk.checked : true;
    const items = S.cart.map(ci=>({...ci, peca:S.pecas[ci.pn]})).filter(x=>x.peca);
    const materialFoto = S.checkoutMaterialFotos.find(f=>f) || null;
    for(const it of items){
      await confirmarRetirada({
        pn:it.pn, qtd:it.qtd, responsavel:S.checkoutResponsavel||S.user.nome,
        observacao:`Pedido${S.checkoutNumeroPedido?(' nº '+S.checkoutNumeroPedido):''} — RC ${S.checkoutRC}`, fotoBase64:materialFoto, tipo:'whatsapp',
        rc:S.checkoutRC, numeroPedido:S.checkoutNumeroPedido, selfie:S.checkoutSelfie, materialFotos:S.checkoutMaterialFotos.filter(Boolean)
      });
    }
    if(sendWA){
      let msg = `🛒 *PEDIDO DE PEÇAS - ZAMINE*\n`;
      if(S.checkoutNumeroPedido) msg += `🔢 Número do Pedido: ${S.checkoutNumeroPedido}\n`;
      msg += `📋 RC: ${S.checkoutRC}\n👤 Responsável: ${S.checkoutResponsavel||S.user.nome}\n📅 Data: ${fmtData(new Date().toISOString())}\n\n`;
      items.forEach(it=>{ msg += `📦 ${it.pn} - ${it.peca.nome||it.peca.descricao}\n   Qtd: ${it.qtd} ${it.peca.unidade||'UN'}\n\n`; });
      msg += '📸 Selfie e foto(s) do material ficam salvas no sistema (histórico de retiradas).\n---\nEnviado via Plataforma Zamine Brasil';
      window.open(`https://wa.me/${WHATS_NUM}?text=${encodeURIComponent(msg)}`,'_blank');
    }
    S.cart=[]; S.modal=null; S.cartOpen=false; resetCheckout(); toast('Pedido registrado');
    render(); return;
  }

  if(a==='toggle-hist'){ S.expandedHist = S.expandedHist===el.dataset.id ? null : el.dataset.id; render(); return; }
  if(a==='print-retirada'){ e.stopPropagation(); printRetirada(el.dataset.id); return; }
  if(a==='clear-pesquisas'){ if(confirm('Limpar todo o histórico de pesquisas?')){ S.pesquisas=[]; await setJSON('pesquisas',[]); render(); } return; }

  if(a==='export-backup'){ exportBackup(); return; }
  if(a==='export-excel'){ exportExcel(); return; }
  if(a==='import-backup'){ await importBackup(); return; }
}

function addToCart(pn){
  const existing = S.cart.find(c=>c.pn===pn);
  if(existing) existing.qtd++; else S.cart.push({pn, qtd:1});
  toast('Adicionado ao carrinho');
  render();
}
function changeCartQty(pn, d){
  const it = S.cart.find(c=>c.pn===pn); if(!it) return;
  it.qtd += d;
  if(it.qtd<=0) S.cart = S.cart.filter(c=>c.pn!==pn);
  render();
}

function exportBackup(){
  const data = {pecas:S.pecas, retiradas:S.retiradas, pesquisas:S.pesquisas, logins:S.logins};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url;
  a.download = `estoque-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
}
async function importBackup(){
  const raw = document.getElementById('backup-json').value;
  if(!raw.trim()) return;
  if(!confirm('Isso vai substituir TODOS os dados atuais. Continuar?')) return;
  try{
    const data = JSON.parse(raw);
    S.pecas = data.pecas||{}; S.retiradas=data.retiradas||[]; S.pesquisas=data.pesquisas||[]; S.logins=data.logins||[];
    await setJSON('pecas',S.pecas); await setJSON('retiradas',S.retiradas); await setJSON('pesquisas',S.pesquisas); await setJSON('logins',S.logins);
    toast('Backup restaurado'); render();
  }catch(e){ toast('JSON inválido'); }
}
function exportExcel(){
  const rows = filteredPecas().length===pecasArr().length ? pecasArr() : pecasArr();
  const data = rows.sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).map(p=>({PN:p.pn, 'Endereço':p.endereco||'', Coluna:p.coluna||'', Qtd:p.qtd, 'Descrição':p.descricao||p.nome||'', Categoria:p.categoria||'', Minimo:p.minimo||0}));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Estoque');
  XLSX.writeFile(wb, `estoque-zamine-${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ---------- Uploads ---------- */
function wirePhotoInputs(){
  document.querySelectorAll('[data-action-input]').forEach(input=>{
    input.onchange = async (e)=>{
      const type = input.dataset.actionInput;
      const file = e.target.files[0]; if(!file) return;
      const b64 = await fileToCompressedBase64(file, 640, .72);
      if(type==='retirar-foto'){ S.retirarFoto = b64; render(); }
      if(type==='co-selfie'){ S.checkoutSelfie = b64; render(); }
      if(type==='co-material'){ S.checkoutMaterialFotos[parseInt(input.dataset.idx)] = b64; render(); }
    };
  });
  const photoInput = document.getElementById('photo-input');
  if(photoInput) photoInput.onchange = e=> handlePhotoBatch(e.target.files);
  const excelInput = document.getElementById('excel-input');
  if(excelInput) excelInput.onchange = e=> handleExcelFile(e.target.files[0]);
}
function wireDropzones(){
  const pz = document.getElementById('photo-dropzone');
  if(pz){
    pz.ondragover = e=>{ e.preventDefault(); pz.classList.add('drag'); };
    pz.ondragleave = ()=> pz.classList.remove('drag');
    pz.ondrop = e=>{ e.preventDefault(); pz.classList.remove('drag'); handlePhotoBatch(e.dataTransfer.files); };
  }
  const ez = document.getElementById('excel-dropzone');
  if(ez){
    ez.ondragover = e=>{ e.preventDefault(); ez.classList.add('drag'); };
    ez.ondragleave = ()=> ez.classList.remove('drag');
    ez.ondrop = e=>{ e.preventDefault(); ez.classList.remove('drag'); handleExcelFile(e.dataTransfer.files[0]); };
  }
}
async function handlePhotoBatch(fileList){
  const files = [...fileList].filter(f=>f.type.startsWith('image/'));
  let ok=0; const fail=[];
  for(const f of files){
    const pn = f.name.replace(/\.[^/.]+$/,'').trim().toUpperCase();
    if(!S.pecas[pn]){ fail.push(f.name); continue; }
    const b64 = await fileToCompressedBase64(f, 700, .75);
    if(b64){ await setFoto(pn, b64); S.fotoCache[pn]=b64; ok++; }
  }
  S.photoUploadReport = {ok, fail};
  toast(`${ok} foto(s) vinculada(s)`);
  render();
}
async function handleExcelFile(file){
  if(!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
  let count=0;
  rows.forEach(row=>{
    const pn = String(row['PN']||row['Pn']||row['pn']||'').trim().toUpperCase();
    if(!pn) return;
    const existing = S.pecas[pn] || {};
    S.pecas[pn] = {
      pn,
      nome: existing.nome || String(row['Descrição']||row['Descricao']||'').trim(),
      descricao: String(row['Descrição']||row['Descricao']||'').trim(),
      endereco: String(row['Endereço']||row['Endereco']||'').trim(),
      coluna: String(row['Coluna']||'').trim(),
      qtd: Number(row['Qtd']||row['Quantidade']||0)||0,
      unidade: existing.unidade || 'UN',
      categoria: existing.categoria || '',
      minimo: existing.minimo || 0,
    };
    count++;
  });
  await setJSON('pecas', S.pecas);
  S.excelImportReport = count;
  toast(`${count} peça(s) importada(s) da planilha`);
  render();
}

/* ---------- Print ---------- */

  const extraMaterialFotos = (r.materialFotos||[]).filter(f=>f && f!==r.foto);
  const w = window.open('', '_blank');
  w.document.write(`
    <html><head><title>Formulário de Retirada</title><style>
      body{font-family:Arial,sans-serif;padding:30px;color:#111}
      h1{font-size:20px;border-bottom:3px solid #f97316;padding-bottom:8px}
      .row{margin:10px 0;font-size:14px}
      .row b{display:inline-block;width:170px}
      .photos{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
      .photos img{max-width:160px;border-radius:8px}
      .sign{display:flex;gap:40px;margin-top:50px;align-items:flex-end}
      .sign div{flex:1;border-top:1px solid #333;padding-top:6px;text-align:center;font-size:12px}
      .sign img{width:72px;height:72px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 8px;border:2px solid #f97316}
      @media print{ body{padding:10px} }
    </style></head><body>
      <h1>📦 FORMULÁRIO RETIRADA — ZAMINE GOIÁS</h1>
      <div class="row"><b>Peça:</b> ${r.pn} — ${r.nome||''}</div>
      <div class="row"><b>Quantidade:</b> ${r.qtd}</div>
      ${r.rc?`<div class="row"><b>RC:</b> ${r.rc}</div>`:''}
      ${r.numeroPedido?`<div class="row"><b>Número do Pedido:</b> ${r.numeroPedido}</div>`:''}
      <div class="row"><b>Responsável:</b> ${r.responsavel||'—'}</div>
      <div class="row"><b>Data:</b> ${fmtData(r.data)}</div>
      <div class="row"><b>Observação:</b> ${r.observacao||'—'}</div>
      <div class="row"><b>Registrado por (login):</b> ${r.usuario}</div>
      ${(r.foto||extraMaterialFotos.length)?`<div class="row"><b>Foto(s) do material:</b><div class="photos">
        ${r.foto?`<img src="${r.foto}">`:''}
        ${extraMaterialFotos.map(f=>`<img src="${f}">`).join('')}
      </div></div>`:''}
      <div class="sign">
        <div>
          ${r.selfie?`<img src="${r.selfie}">`:''}
          Assinatura / Selfie do Retirante
        </div>
        <div style="padding-top:78px">Assinatura do Responsável / Vendedor</div>
      </div>
    </body></html>`);
  w.document.close();
  setTimeout(()=>w.print(), 300);
}
</script>
