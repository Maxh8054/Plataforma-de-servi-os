<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frota Hitachi — Brasil</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
:root{
  --bg:#080a0e;--bg2:#0f1218;--bg3:#161b25;
  --br:rgba(255,255,255,.06);--brh:rgba(255,255,255,.12);
  --t1:#eef0f4;--t2:#7c8494;--t3:#3e4452;
  --blue:#388add;--blue-d:rgba(56,138,221,.12);
  --green:#1d9e75;--orange:#c98a1e;--pink:#d4537e;--purple:#7f77dd;
  --r:14px;--font:'Inter',sans-serif;--disp:'Space Grotesk',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.bg-seq{position:fixed;inset:0;z-index:0}
.bg-seq img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;will-change:opacity}
.bg-seq img.on{opacity:1}
.bg-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,10,14,.5) 0%,rgba(8,10,14,.75) 50%,rgba(8,10,14,.96) 100%)}
.bg-vig{position:absolute;inset:0;box-shadow:inset 0 0 220px 80px rgba(8,10,14,.85)}

.content{position:relative;z-index:1;min-height:100vh}

.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:3rem 2rem;text-align:center}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);background:var(--blue-d);border:1px solid rgba(56,138,221,.2);padding:6px 16px;border-radius:99px;margin-bottom:20px}
.hero h1{font-family:var(--disp);font-size:clamp(34px,5.5vw,68px);font-weight:700;line-height:1;letter-spacing:-.03em;margin-bottom:12px}
.hero h1 span{color:var(--blue)}
.hero p{font-size:15px;color:var(--t2);max-width:440px;line-height:1.6}

.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:800px;width:100%;margin-top:44px}
.cat-card{position:relative;height:280px;border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--br);transition:all .35s ease}
.cat-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.25,.46,.45,.94);animation:kb 28s ease-in-out infinite alternate}
@keyframes kb{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.1) translate(-.8%,-.6%)}}
.cat-card:nth-child(2) img{animation-delay:-14s}
.cat-card .cg{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,10,14,.15) 0%,rgba(8,10,14,.25) 40%,rgba(8,10,14,.88) 100%);z-index:1}
.cat-card .scan{position:absolute;top:0;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);z-index:2;animation:sc 6s ease-in-out infinite;pointer-events:none}
.cat-card:nth-child(2) .scan{animation-delay:-3s}
@keyframes sc{0%{left:-40%}100%{left:100%}}
.cat-card .cb{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:24px;display:flex;flex-direction:column;gap:5px}
.cat-card .ci{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:2px;transition:all .3s}
.cat-card h2{font-family:var(--disp);font-size:19px;font-weight:600;color:#fff}
.cat-card .cc{font-size:13px;color:var(--t2)}
.cat-card .cc b{color:var(--t1);font-weight:700;font-family:var(--disp);font-size:22px}
.cat-card:hover{border-color:var(--brh);transform:translateY(-4px);box-shadow:0 24px 64px rgba(0,0,0,.5)}
.cat-card:hover img{transform:scale(1.06)}
.cat-card.sel{border-color:var(--blue);box-shadow:0 0 40px rgba(56,138,221,.18),0 24px 64px rgba(0,0,0,.4)}
.cat-card.sel .scan{background:linear-gradient(90deg,transparent,rgba(56,138,221,.1),transparent)}
.cat-card.sel .ci{background:var(--blue)!important;color:#fff!important;box-shadow:0 0 24px rgba(56,138,221,.45)}

.detail{padding:0 2rem 6rem;max-width:1200px;margin:0 auto;opacity:0;transform:translateY(28px);transition:opacity .45s ease,transform .45s ease;pointer-events:none}
.detail.show{opacity:1;transform:translateY(0);pointer-events:auto}
.dh{display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--br)}
.dh h2{font-family:var(--disp);font-size:22px;font-weight:700}
.back{background:var(--bg3);border:1px solid var(--br);border-radius:10px;padding:8px 16px;font-size:13px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;font-family:var(--font)}
.back:hover{border-color:var(--brh);color:var(--t1)}

.chips{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.chip{background:var(--bg3);border:1px solid var(--br);border-radius:99px;padding:7px 14px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;font-family:var(--font);white-space:nowrap}
.chip:hover{border-color:var(--brh);color:var(--t1)}
.chip.on{background:var(--blue-d);border-color:rgba(56,138,221,.3);color:var(--blue)}
.chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chip .n{font-size:11px;opacity:.55}

.sg{margin-bottom:32px}
.sgh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sgh .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sgh h3{font-family:var(--disp);font-size:15px;font-weight:600;color:#fff}
.sgh span{font-size:12px;color:var(--t3);margin-left:auto}

.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--br);background:rgba(15,18,24,.55);backdrop-filter:blur(10px)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{text-align:left;padding:12px 16px;font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--t2);background:rgba(22,27,37,.7);border-bottom:1px solid var(--br);white-space:nowrap;position:sticky;top:0;z-index:2}
.tbl tbody tr{transition:background .15s}
.tbl tbody tr:hover{background:rgba(56,138,221,.06)}
.tbl tbody td{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.td-id{font-family:var(--disp);font-weight:600;color:#fff}
.td-model{color:var(--t1);font-weight:500}
.badge{font-size:10px;padding:3px 10px;border-radius:99px;font-weight:600;letter-spacing:.3px;display:inline-block}
.b-ex{background:rgba(56,138,221,.12);color:#6aadee;border:1px solid rgba(56,138,221,.15)}
.b-eh4{background:rgba(212,83,126,.12);color:#e87da3;border:1px solid rgba(212,83,126,.15)}
.b-ex5{background:rgba(186,117,23,.12);color:#d9a244;border:1px solid rgba(186,117,23,.15)}
.td-emp{color:var(--t2)}
.td-ano{color:var(--t2)}
.td-emp i,.td-ano i{vertical-align:middle;opacity:.4;margin-right:4px}
.td-um{color:var(--t2)}
.tbl-count{font-size:12px;color:var(--t3);margin-top:8px;text-align:right}

.no-r{text-align:center;padding:4rem 1rem;color:var(--t3);font-size:14px}
.pl{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--blue),#5bb8ff);z-index:10000;transition:width .3s;box-shadow:0 0 14px rgba(56,138,221,.5)}

@media(max-width:700px){
  .cat-grid{grid-template-columns:1fr;max-width:400px}
  .cat-card{height:220px}
  .hero{padding:2rem 1.5rem}
  .detail{padding:0 1rem 4rem}
  .tbl{font-size:12px}
  .tbl thead th{padding:10px 12px;font-size:10px}
  .tbl tbody td{padding:8px 12px}
}
</style>
</head>

/* ═══ BG SCROLL ═══ */
const bf=[document.getElementById('b0'),document.getElementById('b1'),document.getElementById('b2')];
let bl=0;
bf.forEach(i=>{const l=new Image();l.onload=l.onerror=()=>{bl++;document.getElementById('pl').style.width=(bl/3*100)+'%';if(bl===3)setTimeout(()=>document.getElementById('pl').style.opacity='0',300)};l.src=i.src});
function uBg(){const s=document.documentElement.scrollHeight-innerHeight;if(s<=0){bf[0].style.opacity=1;bf[1].style.opacity=0;bf[2].style.opacity=0;return}const p=Math.min(1,scrollY/s),pos=p*2,c=Math.floor(pos),n=Math.min(c+1,2),f=pos-c;bf.forEach((fr,i)=>{fr.style.opacity=i===c?1-f:i===n?f:0})}
addEventListener('scroll',uBg,{passive:true});

/* ═══ COUNT UP ═══ */
function cu(el,t){let s=null;const d=1400;(function step(ts){if(!s)s=ts;const p=Math.min((ts-s)/d,1);el.textContent=Math.round((1-Math.pow(1-p,3))*t);if(p<1)requestAnimationFrame(step)})(performance.now())}

let ac=null,as='';

function sel(c){if(ac===c){go();return}ac=c;as='';document.getElementById('cE').classList.toggle('sel',c==='e');document.getElementById('cC').classList.toggle('sel',c==='c');document.getElementById('dT').textContent=c==='e'?'Escavadeiras Hidráulicas':'Caminhões EH4000-AC3';bChips(c);rMach(c,'');document.getElementById('det').classList.add('show');setTimeout(()=>document.getElementById('det').scrollIntoView({behavior:'smooth',block:'start'}),120)}

function go(){ac=null;as='';document.getElementById('cE').classList.remove('sel');document.getElementById('cC').classList.remove('sel');document.getElementById('det').classList.remove('show');scrollTo({top:0,behavior:'smooth'})}

function bChips(c){const d=c==='e'?ESC:CAM;const sites=[...new Set(d.map(r=>r[c==='e'?4:3]))].sort();const ct={};d.forEach(r=>{const k=r[c==='e'?4:3];ct[k]=(ct[k]||0)+1});document.getElementById('chips').innerHTML=`<button class="chip on" onclick="fS('')">Todos <span class="n">${d.length}</span></button>`+sites.map(s=>`<button class="chip" data-s="${s}" onclick="fS('${s}')"><span class="dot" style="background:${SC[s]||'#888'}"></span>${s} <span class="n">${ct[s]}</span></button>`).join('')}

function fS(s){as=s;document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.s===s||(!s&&!c.dataset.s)));rMach(ac,s)}

function sBadge(s){const m={EX1200:'b-ex',EX2600:'b-ex',EX5600:'b-ex5',EH4000:'b-eh4'};return`<span class="badge ${m[s]||'b-ex'}">${s}</span>`}

function rMach(c,site){
  const area=document.getElementById('area');
  let d;
  if(c==='e')d=ESC.filter(r=>!site||r[4]===site).map(r=>({id:r[0],mod:r[1],um:r[2],sz:r[3],site:r[4],emp:r[5],ano:r[6]}));
  else d=CAM.filter(r=>!site||r[3]===site).map(r=>({id:r[0],mod:r[1],um:r[2],sz:'EH4000',site:r[3],emp:r[4],ano:r[5]}));
  if(!d.length){area.innerHTML='<div class="no-r"><i class="ti ti-search-off" style="font-size:32px;display:block;margin-bottom:8px;opacity:.4"></i>Nenhum equipamento neste site</div>';return}
  const g={};d.forEach(m=>{if(!g[m.site])g[m.site]=[];g[m.site].push(m)});
  area.innerHTML=Object.entries(g).map(([s,machines])=>{
    const col=SC[s]||'#888';
    const rows=machines.map(m=>`<tr><td class="td-id">${m.id}</td><td class="td-model">${m.mod}</td><td>${sBadge(m.sz)}</td><td class="td-um">${m.um}</td><td class="td-emp"><i class="ti ti-building" style="font-size:12px;opacity:.4"></i>${m.emp}</td><td class="td-ano"><i class="ti ti-calendar" style="font-size:11px;opacity:.4"></i>${m.ano}</td></tr>`).join('');
    return`<div class="sg"><div class="sgh"><span class="dot" style="background:${col};box-shadow:0 0 8px ${col}80"></span><h3>${s}</h3><span>${machines.length} un.</span></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Equipamento</th><th>Modelo</th><th>Tamanho</th><th>Operador</th><th>Empresa</th><th>Ano</th></tr></thead><tbody>${rows}</tbody></table></div><div class="tbl-count">${machines.length} equipamento${machines.length>1?'s':''}</div></div>`}).join('');
}

cu(document.getElementById('nE'),ESC.length);
cu(document.getElementById('nC'),CAM.length);
</script>
</body>
</html>
